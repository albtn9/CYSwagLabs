name: Cypress E2E

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  cypress:
    name: Cypress (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    permissions:
    contents: read
    checks: write
    pull-requests: write
    
    strategy:
      fail-fast: false
      matrix:
        browser:
          - electron
          - chrome
          - firefox

    defaults:
      run:
        working-directory: saucedemo

    container:
      image: cypress/browsers:node-22.21.0-chrome-141.0.7390.107-1-ff-144.0-edge-141.0.3537.92-1
      options: --user 1001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: saucedemo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create reports folder
        run: mkdir -p cypress/reports

      - name: Run Cypress tests
        run: |
          npx cypress run \
            --browser ${{ matrix.browser }} \
            --reporter junit \
            --reporter-options "mochaFile=cypress/reports/results-[hash].xml,toConsole=true"

      - name: Upload JUnit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-${{ matrix.browser }}-report
          path: saucedemo/cypress/reports

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-${{ matrix.browser }}-screenshots
          path: saucedemo/cypress/screenshots

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-${{ matrix.browser }}-videos
          path: saucedemo/cypress/videos

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: saucedemo/cypress/reports/**/*.xml